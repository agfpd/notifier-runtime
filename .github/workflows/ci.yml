name: CI

# Runs the test + typecheck gate on every push to main and on PRs — a safety net
# independent of any local machine. macOS runner: notifier-runtime is macOS-targeted
# (launchd / the iapeer host), so a green CI must reflect the real platform. Mirrors
# the foundation's ci.yml (the ecosystem convention).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run test
      - run: bun run typecheck
